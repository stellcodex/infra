server {
  listen 80;
  listen [::]:80;
  server_name stellcodex.com www.stellcodex.com;
  return 301 https://stellcodex.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.stellcodex.com;

  ssl_certificate /etc/ssl/stellcodex/origin.pem;
  ssl_certificate_key /etc/ssl/stellcodex/origin.key;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  include /etc/nginx/snippets/cloudflare-real-ip.conf;

  return 301 https://stellcodex.com$request_uri;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name stellcodex.com;

  ssl_certificate /etc/ssl/stellcodex/origin.pem;
  ssl_certificate_key /etc/ssl/stellcodex/origin.key;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  include /etc/nginx/snippets/cloudflare-real-ip.conf;

  client_max_body_size 250m;

  location ^~ /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
  }

  location /s3/ {
    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "public, max-age=2592000" always;
  }

  location ^~ /stellcodex/ {
    proxy_pass http://127.0.0.1:9000;
    proxy_http_version 1.1;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "public, max-age=2592000" always;
  }

  location /stell/webhook {
    proxy_pass http://127.0.0.1:4500;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_http_version 1.1;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "no-store" always;
  }

  location = /stell/health {
    proxy_pass http://127.0.0.1:8000/stell/health;
    proxy_http_version 1.1;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Cache-Control "no-store" always;
  }

  location ^~ /_next/ {
    proxy_pass http://127.0.0.1:3010/_next/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /home {
    return 308 /;
  }

  location = /workspace {
    return 308 /dashboard$is_args$args;
  }

  location = /login {
    return 308 /sign-in$is_args$args;
  }

  location = /register {
    return 308 /sign-in$is_args$args;
  }

  location = /signup {
    return 308 /sign-in$is_args$args;
  }

  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' data: blob: https: http: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;
    add_header Cache-Control "no-cache, must-revalidate" always;

    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;

    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    proxy_connect_timeout 10s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
