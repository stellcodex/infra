x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://stellcodex:${POSTGRES_PASSWORD}@postgres:5432/stellcodex
  REDIS_URL: redis://redis:6379/0
  DB_HOST: postgres
  DB_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  JWT_ALG: ${JWT_ALG}
  JWT_SECRET: ${JWT_SECRET}
  REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS}
  ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES}
  RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES}
  FEATURE_FILES: ${FEATURE_FILES}
  ALLOWED_CONTENT_TYPES: ${ALLOWED_CONTENT_TYPES}
  CONVERSION_TIMEOUT_SECONDS: "1800"
  BLENDER_TIMEOUT_SECONDS: "600"
  SITE_URL: ${SITE_URL}
  AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME}
  AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES}
  AUTH_SEED_ADMIN_EMAIL: ${AUTH_SEED_ADMIN_EMAIL}
  AUTH_SEED_ADMIN_PASSWORD: ${AUTH_SEED_ADMIN_PASSWORD}
  AUTH_SEED_ADMIN_FULL_NAME: ${AUTH_SEED_ADMIN_FULL_NAME}
  AUTH_SEED_MEMBER_EMAIL: ${AUTH_SEED_MEMBER_EMAIL}
  AUTH_SEED_MEMBER_PASSWORD: ${AUTH_SEED_MEMBER_PASSWORD}
  AUTH_SEED_MEMBER_FULL_NAME: ${AUTH_SEED_MEMBER_FULL_NAME}
  GOOGLE_ADMIN_WHITELIST: ${GOOGLE_ADMIN_WHITELIST}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
  STELLCODEX_S3_ENDPOINT_URL: http://minio:9000
  STELLCODEX_S3_REGION: ${STELLCODEX_S3_REGION}
  STELLCODEX_S3_BUCKET: ${STELLCODEX_S3_BUCKET}
  STELLCODEX_S3_ACCESS_KEY_ID: ${STELLCODEX_S3_ACCESS_KEY_ID}
  STELLCODEX_S3_SECRET_ACCESS_KEY: ${STELLCODEX_S3_SECRET_ACCESS_KEY}
  PUBLIC_S3_BASE_URL: ${PUBLIC_S3_BASE_URL}
  WORKDIR: /var/stellcodex/work
  BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN}
  STELL_AI_BASE_URL: http://stellai:7020
  ORCHESTRA_BASE_URL: http://orchestra:7010
  STELL_WEBHOOK_BASE_URL: http://172.27.0.1:4500
  STELL_WEBHOOK_BRIDGE_HOST: ""
  STELL_INTERNAL_CHAT_TRANSPORT: http_first
  STELL_HTTP_BRIDGE_TIMEOUT: "3"

x-stell-ai-env: &stell-ai-env
  DATABASE_URL: postgresql+psycopg2://stellcodex:${POSTGRES_PASSWORD}@postgres:5432/stellcodex
  BACKEND_INTERNAL_BASE_URL: http://backend:8000/api/v1/internal/runtime
  BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN}

x-orchestra-env: &orchestra-env
  BACKEND_INTERNAL_BASE_URL: http://backend:8000/api/v1/internal/runtime
  STELL_AI_BASE_URL: http://stellai:7020
  BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN}

services:
  frontend:
    build:
      context: ${STELLCODEX_REPO_ROOT}
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    container_name: stellcodex-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME}
    ports:
      - "127.0.0.1:3010:3010"
    networks:
      - stellcodex-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3010/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:15
    container_name: stellcodex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stellcodex
      POSTGRES_USER: stellcodex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellcodex -d stellcodex"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: stellcodex-redis
    restart: unless-stopped
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2022-10-24T18-35-07Z
    container_name: stellcodex-minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${STELLCODEX_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${STELLCODEX_S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ${STELLCODEX_REPO_ROOT}/backend
      dockerfile: Dockerfile.backend
    container_name: stellcodex-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/stellcodex/work:/var/stellcodex/work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *backend-env
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    build:
      context: ${STELLCODEX_REPO_ROOT}/backend
      dockerfile: Dockerfile.worker
    container_name: stellcodex-worker
    restart: unless-stopped
    volumes:
      - /var/stellcodex/work:/var/stellcodex/work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *backend-env
    networks:
      - stellcodex-net

  stellai:
    build:
      context: ${STELLAI_REPO_ROOT}
      dockerfile: Dockerfile
    container_name: orchestra-stellai
    restart: unless-stopped
    environment:
      <<: *stell-ai-env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7020/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  orchestra:
    build:
      context: ${ORCHESTRA_REPO_ROOT}
      dockerfile: Dockerfile
    container_name: orchestra-orchestrator
    restart: unless-stopped
    environment:
      <<: *orchestra-env
    depends_on:
      backend:
        condition: service_healthy
      stellai:
        condition: service_healthy
    networks:
      - stellcodex-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
    name: postgres_data
  minio_data:
    name: minio_data

networks:
  stellcodex-net:
    name: stellcodex-net
