name: boundary-gate

on:
  push:
  pull_request:

jobs:
  verify-boundary-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify-canonical-infra-layout
        run: |
          set -euo pipefail
          for d in deploy docs nginx ops scripts; do
            test -d "$d" || { echo "missing:$d"; exit 1; }
          done
          test -f deploy/docker-compose.yml || { echo "missing:deploy/docker-compose.yml"; exit 1; }
          test -f nginx/stellcodex.conf || { echo "missing:nginx/stellcodex.conf"; exit 1; }
          echo "PASS canonical infra boundary layout"
