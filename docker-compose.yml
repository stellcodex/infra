services:
  postgres:
    image: postgres:15
    container_name: stellcodex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    networks:
      - stellcodex-net

  redis:
    image: redis:7
    container_name: stellcodex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-16379}:6379"
    networks:
      - stellcodex-net

  minio:
    image: minio/minio
    container_name: stellcodex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    networks:
      - stellcodex-net

  stell-ai:
    build:
      context: ../stell-ai
    container_name: stellcodex-stell-ai
    restart: unless-stopped
    environment:
      PORT: ${STELLAI_PORT:-7020}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
      - redis
    ports:
      - "${STELLAI_PORT:-7020}:7020"
    networks:
      - stellcodex-net

  orchestra:
    build:
      context: ../orchestra
    container_name: stellcodex-orchestra
    restart: unless-stopped
    environment:
      PORT: ${ORCHESTRA_PORT:-7010}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STELL_AI_URL: http://stell-ai:7020
    depends_on:
      - postgres
      - redis
      - stell-ai
    ports:
      - "${ORCHESTRA_PORT:-7010}:7010"
    networks:
      - stellcodex-net

  stellcodex:
    build:
      context: ../stellcodex
    container_name: stellcodex-app
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ORCHESTRA_URL: http://orchestra:7010
      STELL_AI_URL: http://stell-ai:7020
    depends_on:
      - postgres
      - redis
      - minio
      - orchestra
      - stell-ai
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    networks:
      - stellcodex-net

  nginx:
    image: nginx:latest
    container_name: stellcodex-nginx
    restart: unless-stopped
    depends_on:
      - stellcodex
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    networks:
      - stellcodex-net

networks:
  stellcodex-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
